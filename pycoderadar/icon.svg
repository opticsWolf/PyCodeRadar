<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="radarGrad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="100">
      <stop offset="0%" stop-color="#E0004D" />  <stop offset="50%" stop-color="#6A0080" /> <stop offset="100%" stop-color="#006CB5" /> </linearGradient>

    <clipPath id="circleClip">
      <circle cx="50" cy="50" r="47" />
    </clipPath>

    <mask id="wedgeMask">
      <rect width="100" height="100" fill="white" />
      <polygon points="50,50 136.6,0 100,-36.6" fill="black" />
    </mask>
  </defs>

  <g mask="url(#wedgeMask)">
    <circle cx="50" cy="50" r="47" fill="url(#radarGrad)" />

    <g clip-path="url(#circleClip)">
      <line x1="50" y1="0" x2="50" y2="100" stroke="#FFFFFF" stroke-width="2.5" />
      <line x1="0" y1="50" x2="100" y2="50" stroke="#FFFFFF" stroke-width="2.5" />
      <circle cx="50" cy="50" r="21" fill="none" stroke="#FFFFFF" stroke-width="2.5" />
      <circle cx="50" cy="50" r="34" fill="none" stroke="#FFFFFF" stroke-width="2.5" />
    </g>
  </g>

  <circle cx="50" cy="50" r="8" fill="url(#radarGrad)" stroke="#FFFFFF" stroke-width="2.5" />
  
  <circle cx="26" cy="26" r="9.5" fill="url(#radarGrad)" stroke="#FFFFFF" stroke-width="2.5" />
  <text x="26" y="26" font-family="monospace, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">0</text>
  
  <circle cx="64.85" cy="64.85" r="9.5" fill="url(#radarGrad)" stroke="#FFFFFF" stroke-width="2.5" />
  <text x="64.85" y="64.85" font-family="monospace, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">1</text>
  
  <circle cx="16.76" cy="83.24" r="10.5" fill="url(#radarGrad)" stroke="#FFFFFF" stroke-width="2.5" />
  <text x="16.76" y="83.24" font-family="monospace, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">0</text>
</svg>
